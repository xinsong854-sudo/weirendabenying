<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页 - AI 增强版</title>
    <style>
        :root {
            --paper: #efe4cf;
            --paper-deep: #d8c69f;
            --ink: #2a2420;
            --ink-soft: #665b50;
            --night: #151b24;
            --teal: #1f5f62;
            --teal-dark: #143f43;
            --wine: #7d2637;
            --gold: #b88a3b;
            --gold-soft: #d9bd78;
            --line: rgba(80, 58, 34, .28);
            --shadow: rgba(39, 27, 18, .28);
            --radius: 18px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: "Noto Serif SC", "Songti SC", "SimSun", Georgia, serif;
            min-height: 100vh;
            color: var(--ink);
            overflow-x: hidden;
            background:
                radial-gradient(circle at 18% 12%, rgba(217, 189, 120, .24) 0 16%, transparent 33%),
                radial-gradient(circle at 86% 8%, rgba(31, 95, 98, .30) 0 14%, transparent 34%),
                radial-gradient(circle at 70% 82%, rgba(125, 38, 55, .16) 0 18%, transparent 40%),
                linear-gradient(145deg, #17202b 0%, #25313a 38%, #cdbb92 38.2%, #eadfc7 100%);
            background-attachment: fixed;
        }
        body::before {
            content: "";
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background:
                repeating-linear-gradient(90deg, rgba(76,55,34,.035) 0 1px, transparent 1px 5px),
                repeating-linear-gradient(0deg, rgba(76,55,34,.025) 0 1px, transparent 1px 7px),
                radial-gradient(circle at 50% 30%, transparent 0 40%, rgba(20, 20, 20, .10) 100%);
            mix-blend-mode: multiply;
        }
        body::after {
            content: "REV:1999";
            position: fixed; right: -42px; top: 42%; z-index: 0;
            transform: rotate(90deg); letter-spacing: .45em;
            font: 700 11px/1 Georgia, serif; color: rgba(184,138,59,.28);
            pointer-events: none;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: .45; }
        .star {
            position: absolute; width: 2px; height: 2px; background: var(--gold-soft); border-radius: 50%;
            box-shadow: 0 0 10px rgba(217,189,120,.65);
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        @keyframes twinkle { 0%,100% { opacity: 0.12; transform: scale(.7); } 50% { opacity: .8; transform: scale(1.35); } }
        .container { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 56px 22px 44px; }
        .container::before {
            content: ""; position: absolute; inset: 28px 8px 18px; z-index: -1;
            border: 1px solid rgba(184,138,59,.38); border-radius: 28px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.22), 0 30px 80px rgba(0,0,0,.24);
            pointer-events: none;
        }
        .hero { text-align: center; margin-bottom: 34px; padding: 22px 16px 10px; }
        .hero::before, .hero::after { content: "✦"; color: var(--gold); margin: 0 14px; font-size: 1rem; }
        .hero h1 {
            display: inline-block;
            font-size: clamp(2.1rem, 6vw, 4rem); font-weight: 800; letter-spacing: .08em;
            color: var(--paper); text-shadow: 0 2px 0 rgba(0,0,0,.3), 0 0 28px rgba(217,189,120,.22);
            margin-bottom: 14px; position: relative;
        }
        .hero h1::after {
            content: ""; display: block; width: 68%; height: 2px; margin: 12px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .hero p { font-size: 1.03rem; color: rgba(239,228,207,.78); max-width: 650px; margin: 0 auto; letter-spacing: .08em; }
        .clock { text-align: center; margin: 0 auto 34px; max-width: 560px; padding: 20px; color: var(--paper); }
        .clock-time {
            font-size: clamp(2.4rem, 7vw, 4.8rem); font-weight: 400; font-family: Georgia, 'Times New Roman', serif;
            letter-spacing: 7px; color: var(--gold-soft); text-shadow: 0 0 22px rgba(217,189,120,.35);
        }
        .clock-date { font-size: .95rem; color: rgba(239,228,207,.62); margin-top: 8px; letter-spacing: .18em; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 18px; margin-bottom: 32px; }
        .card, .section-box {
            position: relative; overflow: hidden;
            background:
                linear-gradient(145deg, rgba(255,250,238,.88), rgba(223,207,168,.82)),
                radial-gradient(circle at top right, rgba(184,138,59,.22), transparent 45%);
            border: 1px solid rgba(90,66,39,.34); border-radius: var(--radius);
            box-shadow: 0 18px 42px var(--shadow), inset 0 0 0 1px rgba(255,255,255,.45);
        }
        .card::before, .section-box::before {
            content: ""; position: absolute; inset: 10px; border: 1px solid rgba(184,138,59,.35); border-radius: calc(var(--radius) - 8px); pointer-events: none;
        }
        .card { padding: 30px 28px; transition: transform .28s ease, box-shadow .28s ease, border-color .28s ease; }
        .card:hover { transform: translateY(-5px) rotate(-.25deg); border-color: rgba(184,138,59,.72); box-shadow: 0 24px 54px rgba(39,27,18,.36); }
        .card-icon { font-size: 2rem; margin-bottom: 14px; color: var(--wine); filter: sepia(.2); }
        .card h3, .section-box h2 { color: var(--teal-dark); letter-spacing: .08em; }
        .card h3 { font-size: 1.12rem; margin-bottom: 9px; }
        .card p { color: var(--ink-soft); line-height: 1.65; font-size: .95rem; }
        .section-box { padding: 34px; margin-bottom: 26px; }
        .section-box h2 { margin-bottom: 18px; text-align: center; font-size: 1.28rem; }
        .section-box h2::before, .section-box h2::after { content: "—"; color: var(--gold); margin: 0 10px; }
        .input-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        .input-row input {
            flex: 1; min-width: 200px; padding: 13px 16px; border: 1px solid rgba(80,58,34,.32);
            border-radius: 8px; background: rgba(255,252,243,.62); color: var(--ink); font-size: .95rem; outline: none;
            font-family: inherit; transition: border-color .25s, box-shadow .25s, background .25s;
        }
        .input-row input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,138,59,.16); background: rgba(255,252,243,.88); }
        .input-row input::placeholder { color: rgba(42,36,32,.42); }
        .btn {
            padding: 12px 24px; border: 1px solid rgba(255,255,255,.25); border-radius: 8px; font-size: .98rem;
            font-weight: 700; cursor: pointer; transition: all .25s ease; white-space: nowrap; font-family: inherit; letter-spacing: .05em;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), 0 8px 18px rgba(54,36,20,.18);
        }
        .btn-primary { background: linear-gradient(135deg, var(--teal), var(--teal-dark)); color: #fff7e7; }
        .btn-danger { background: linear-gradient(135deg, var(--wine), #4d1722); color: #fff7e7; }
        .btn-success { background: linear-gradient(135deg, #6b7b41, #33451f); color: #fff7e7; }
        .btn-warn { background: linear-gradient(135deg, var(--gold-soft), var(--gold)); color: #302316; }
        .btn:hover { transform: translateY(-2px); filter: saturate(1.08); box-shadow: 0 12px 24px rgba(54,36,20,.28); }
        .btn:active { transform: translateY(0) scale(.98); }
        .counter-display { font-size: 4.3rem; font-weight: 700; color: var(--wine); margin: 12px 0 18px; text-align: center; font-family: Georgia, 'Times New Roman', serif; transition: transform .15s ease; text-shadow: 0 2px 0 rgba(255,255,255,.55); }
        .counter-btns { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .note-list { list-style: none; }
        .note-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 15px; background: rgba(255,252,243,.48); border: 1px solid rgba(80,58,34,.16); border-radius: 9px; margin-bottom: 9px;
            animation: fadeIn .3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .note-item span { color: var(--ink); }
        .note-delete { background: none; border: none; color: rgba(125,38,55,.55); font-size: 1.1rem; cursor: pointer; transition: color .25s, transform .25s; }
        .note-delete:hover { color: var(--wine); transform: rotate(8deg) scale(1.08); }

        /* Token 状态栏 */
        .token-bar {
            display: flex; align-items: center; gap: 12px; padding: 14px 18px;
            background: rgba(29, 38, 44, .08); border-radius: 10px; margin-bottom: 14px;
            border: 1px solid rgba(80,58,34,.18); flex-wrap: wrap;
        }
        .token-status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .token-status-dot.green { background: #6b7b41; box-shadow: 0 0 9px #6b7b41; }
        .token-status-dot.yellow { background: var(--gold); box-shadow: 0 0 9px var(--gold); }
        .token-status-dot.red { background: var(--wine); box-shadow: 0 0 9px var(--wine); }
        .token-status-dot.gray { background: rgba(42,36,32,.25); }
        .token-info { flex: 1; min-width: 120px; }
        .token-info .label { font-size: .8rem; color: rgba(42,36,32,.52); }
        .token-info .value { font-size: 1rem; font-weight: 700; }
        .token-info .value.green { color: #52612e; }
        .token-info .value.yellow { color: #946918; }
        .token-info .value.red { color: var(--wine); }
        .token-info .value.gray { color: rgba(42,36,32,.45); }
        .btn-sm { padding: 8px 14px; font-size: .84rem; border-radius: 7px; }
        .btn-ghost { background: rgba(255,252,243,.55); color: var(--teal-dark); border: 1px solid rgba(80,58,34,.22); }
        .btn-ghost:hover { background: rgba(255,252,243,.85); color: var(--wine); }

        /* 聊天窗口 */
        #chatHistory {
            height: 280px; overflow-y: auto; background: rgba(255,252,243,.48);
            border-radius: 10px; padding: 16px; margin-bottom: 14px;
            border: 1px solid rgba(80,58,34,.18); color: var(--ink);
        }
        #chatHistory::-webkit-scrollbar { width: 6px; }
        #chatHistory::-webkit-scrollbar-thumb { background: rgba(184,138,59,.5); border-radius: 999px; }

        /* 凭证设置面板 */
        .creds-panel {
            background: rgba(255,252,243,.38); border-radius: 10px; padding: 18px;
            margin-bottom: 14px; display: none; border: 1px dashed rgba(80,58,34,.28);
        }
        .creds-panel.open { display: block; }
        .creds-panel label { font-size: .85rem; color: rgba(42,36,32,.62); display: block; margin-bottom: 4px; }
        .creds-panel .input-row { margin-bottom: 8px; }
        .creds-panel .hint { font-size: .75rem; color: rgba(42,36,32,.46); margin-top: 4px; }

        footer { text-align: center; margin-top: 36px; padding: 20px; color: rgba(239,228,207,.58); font-size: .9rem; letter-spacing: .08em; }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
        @media (max-width: 600px) {
            .container { padding: 34px 14px; }
            .hero h1 { font-size: 1.85rem; }
            .clock-time { font-size: 2.35rem; letter-spacing: 3px; }
            .counter-display { font-size: 3rem; }
            .section-box { padding: 28px 18px; }
            .input-row { flex-direction: column; }
            .input-row input { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <div class="hero">
            <h1>✨ 智能个人主页</h1>
            <p>时钟 · 计数器 · 记事本 · AI 对话 — 所有数据由后端统一托管</p>
        </div>

        <div class="clock">
            <div class="clock-time" id="clock">00:00:00</div>
            <div class="clock-date" id="date"></div>
        </div>

        <div class="cards">
            <div class="card"><div class="card-icon">⏰</div><h3>实时时钟</h3><p>精确到秒，自动同步。</p></div>
            <div class="card"><div class="card-icon">🔢</div><h3>云端计数器</h3><p>多设备同步，数据不落盘。</p></div>
            <div class="card"><div class="card-icon">✦</div><h3>AI 助手</h3><p>接入 neta.art LLM，智能对话。</p></div>
        </div>

        <div class="section-box" style="text-align:center;">
            <h2>🔢 计数器</h2>
            <div class="counter-display" id="counter">0</div>
            <div class="counter-btns">
                <button class="btn btn-danger" onclick="changeCounter(-1)">- 1</button>
                <button class="btn btn-primary" onclick="changeCounter(1)">+ 1</button>
                <button class="btn btn-success" onclick="resetCounter()">重置</button>
            </div>
        </div>

        <div class="section-box">
            <h2> 记事本</h2>
            <div class="input-row">
                <input type="text" id="noteInput" placeholder="输入内容后按回车..." onkeypress="if(event.key==='Enter')addNote()">
                <button class="btn btn-primary" onclick="addNote()">添加</button>
            </div>
            <ul class="note-list" id="noteList"></ul>
        </div>

        <!-- 身份卡 / CoC 车卡 -->
        <div class="section-box">
            <h2>🪪 身份卡 · CoC 车卡生成</h2>
            <div class="input-row">
                <input type="password" id="netaTokenInput" placeholder="粘贴你的 Neta Token（仅本次请求使用）">
            </div>
            <div class="input-row">
                <input type="text" id="characterLinkInput" placeholder="粘贴 Neta 角色分享链接 / UUID / 角色名" onkeypress="if(event.key==='Enter')generateCocCard()">
                <button class="btn btn-primary" onclick="generateCocCard()">生成角色卡</button>
            </div>
            <div id="cocCardResult" style="display:none;margin-top:14px;"></div>
        </div>

        <!-- AI 区域 -->
        <div class="section-box">
            <h2>🤖 AI 助手</h2>

            <!-- LLM 状态栏 -->
            <div class="token-bar">
                <div class="token-status-dot gray" id="tokenDot"></div>
                <div class="token-info">
                    <div class="label">LLM 状态</div>
                    <div class="value gray" id="tokenStatusText">正在检查后端配置...</div>
                </div>
            </div>

            <!-- 聊天窗口 -->
            <div id="chatHistory">
                <div style="color:rgba(42,36,32,.48);text-align:center;margin-top:100px;letter-spacing:.08em;">
                    后端 LLM 检查中 ✨
                </div>
            </div>
            <div class="input-row">
                <input type="text" id="chatInput" placeholder="和 AI 聊点什么..." onkeypress="if(event.key==='Enter')sendChat()">
                <button class="btn btn-primary" onclick="sendChat()">发送</button>
            </div>
        </div>

        <footer>Made with ❤️ | 后端运行在云端 · 数据持久化存储</footer>
    </div>

    <script>
        // ===== 星空 =====
        (function(){
            const c=document.getElementById('stars');
            for(let i=0;i<120;i++){
                const s=document.createElement('div');s.className='star';
                s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px`;
                c.appendChild(s);
            }
        })();

        // ===== 时钟 =====
        function tick(){
            const n=new Date();
            document.getElementById('clock').textContent=n.toLocaleTimeString('zh-CN',{hour12:false});
            document.getElementById('date').textContent=n.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
        }
        tick(); setInterval(tick,1000);

        // ===== API 地址（相对路径，前后端同源） =====
        const API = '/api';

        // ===== 计数器 =====
        let count=0;
        const counterEl=document.getElementById('counter');
        async function loadCounter(){
            try{ const r=await fetch(API+'/data'); count=(await r.json()).counter||0; updCounter(); }catch(e){}
        }
        function updCounter(){ counterEl.textContent=count; counterEl.style.transform='scale(1.12)'; setTimeout(()=>counterEl.style.transform='scale(1)',150); }
        counterEl.style.transition='transform .15s ease';
        async function changeCounter(d){
            try{
                const r=await fetch(API+'/counter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:d>0?'add':'subtract',value:Math.abs(d)})});
                count=(await r.json()).counter; updCounter();
            }catch(e){}
        }
        async function resetCounter(){
            try{
                const r=await fetch(API+'/counter',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'set',value:0})});
                count=(await r.json()).counter; updCounter();
            }catch(e){}
        }
        loadCounter();

        // ===== 记事本 =====
        let notes=[];
        function renderNotes(){
            const l=document.getElementById('noteList'); l.innerHTML='';
            if(!notes.length){l.innerHTML='<li style="color:rgba(42,36,32,.45);text-align:center;padding:16px;letter-spacing:.08em;">暂无笔记 ✨</li>';return;}
            notes.forEach(n=>{
                const li=document.createElement('li');li.className='note-item';
                const t=n.createdAt?new Date(n.createdAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}):'';
                li.innerHTML=`<span>${n.text}${t?'<small style="color:rgba(42,36,32,.45);margin-left:8px;">'+t+'</small>':''}</span><button class="note-delete" title="删除" onclick="deleteNote(${n.id})">✕</button>`;
                l.appendChild(li);
            });
        }
        async function addNote(){
            const inp=document.getElementById('noteInput'),txt=inp.value.trim(); if(!txt)return;
            try{
                const r=await fetch(API+'/notes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:txt})});
                notes=(await r.json()).notes; inp.value=''; renderNotes();
            }catch(e){}
        }
        async function deleteNote(id){
            try{ const r=await fetch(API+'/notes/'+id,{method:'DELETE'}); notes=(await r.json()).notes; renderNotes(); }catch(e){}
        }
        (async()=>{try{const r=await fetch(API+'/notes');notes=(await r.json()).notes||[];}catch(e){notes=[];}renderNotes();})();

        // ===== 后端 LLM 状态 =====
        let serverLLMEnabled = false;

        async function loadLLMConfig() {
            const dot = document.getElementById('tokenDot');
            const txt = document.getElementById('tokenStatusText');
            try {
                const r = await fetch(API + '/config');
                const cfg = await r.json();
                serverLLMEnabled = !!cfg.llm_enabled;
                if (serverLLMEnabled) {
                    dot.className = 'token-status-dot green';
                    txt.className = 'value green';
                    txt.textContent = `后端 LLM 已接入 (${cfg.llm_model || '默认模型'})`;
                    document.getElementById('chatHistory').innerHTML = '<div style="color:rgba(42,36,32,.55);text-align:center;margin-top:100px;letter-spacing:.08em;">后端 LLM 已接入，可以直接聊天 ✨</div>';
                } else {
                    dot.className = 'token-status-dot red';
                    txt.className = 'value red';
                    txt.textContent = '后端未配置 LLM_API_KEY';
                    document.getElementById('chatHistory').innerHTML = '<div style="color:rgba(125,38,55,.65);text-align:center;margin-top:100px;letter-spacing:.08em;">请先在后端 .env 配置 LLM_API_KEY</div>';
                }
            } catch(e) {
                dot.className = 'token-status-dot red';
                txt.className = 'value red';
                txt.textContent = '后端连接失败';
            }
        }
        loadLLMConfig();

        // ===== 身份卡 / CoC 车卡 =====
        function escapeHtml(text) {
            return String(text ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
        }

        function renderCocCard(card, profile) {
            const box = document.getElementById('cocCardResult');
            const portrait = card?.portrait || {};
            const src = card?.source_character || {};
            const avatar = portrait.avatar_img || src.avatar_img || profile?.avatar_img || '';
            const header = portrait.header_img || src.header_img || profile?.header_img || '';
            const attrs = card?.attributes || {};
            const derived = card?.derived || {};
            const investigator = card?.investigator || {};
            const skills = Array.isArray(card?.skills) ? card.skills : [];
            const backstory = card?.backstory || {};

            box.style.display = 'block';
            box.innerHTML = `
                <div style="background:rgba(255,252,243,.55);border:1px solid rgba(80,58,34,.18);border-radius:12px;padding:16px;">
                    ${header ? `<img src="${escapeHtml(header)}" alt="header" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:12px;">` : ''}
                    <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;">
                        ${avatar ? `<img src="${escapeHtml(avatar)}" alt="avatar" style="width:120px;height:120px;object-fit:cover;border-radius:12px;border:1px solid rgba(80,58,34,.2);">` : ''}
                        <div style="flex:1;min-width:220px;">
                            <h3 style="color:var(--teal-dark);margin-bottom:8px;">${escapeHtml(investigator.name || src.name || profile?.name || '未命名调查员')}</h3>
                            <p style="color:var(--ink-soft);line-height:1.7;">${escapeHtml(investigator.occupation || '')} · ${escapeHtml(investigator.age || '')} · ${escapeHtml(investigator.era || '')}</p>
                            <p style="color:var(--ink-soft);line-height:1.7;">${escapeHtml(portrait.visual_summary || '')}</p>
                        </div>
                    </div>
                    <h4 style="margin:14px 0 8px;color:var(--wine);">属性</h4>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:8px;">
                        ${Object.entries(attrs).map(([k,v]) => `<div style="background:rgba(255,255,255,.35);padding:8px;border-radius:8px;text-align:center;"><b>${escapeHtml(k)}</b><br>${escapeHtml(v)}</div>`).join('')}
                    </div>
                    <h4 style="margin:14px 0 8px;color:var(--wine);">衍生值</h4>
                    <p style="line-height:1.8;color:var(--ink-soft);">SAN ${escapeHtml(derived.SAN)} / HP ${escapeHtml(derived.HP)} / MP ${escapeHtml(derived.MP)} / MOV ${escapeHtml(derived.MOV)} / DB ${escapeHtml(derived.damage_bonus)} / Build ${escapeHtml(derived.build)}</p>
                    <h4 style="margin:14px 0 8px;color:var(--wine);">主要技能</h4>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        ${skills.slice(0, 18).map(s => `<span style="background:rgba(31,95,98,.1);border:1px solid rgba(31,95,98,.18);padding:6px 10px;border-radius:999px;color:var(--teal-dark);">${escapeHtml(s.name)} ${escapeHtml(s.value)}</span>`).join('')}
                    </div>
                    <h4 style="margin:14px 0 8px;color:var(--wine);">背景</h4>
                    <p style="white-space:pre-wrap;line-height:1.75;color:var(--ink-soft);">${escapeHtml(backstory.personal_description || '')}</p>
                    <details style="margin-top:12px;">
                        <summary style="cursor:pointer;color:var(--teal-dark);font-weight:700;">查看完整 JSON</summary>
                        <pre style="margin-top:10px;white-space:pre-wrap;background:rgba(29,38,44,.08);padding:12px;border-radius:10px;overflow:auto;max-height:420px;">${escapeHtml(JSON.stringify(card, null, 2))}</pre>
                    </details>
                </div>
            `;
        }

        async function generateCocCard() {
            const token = document.getElementById('netaTokenInput').value.trim();
            const link = document.getElementById('characterLinkInput').value.trim();
            const box = document.getElementById('cocCardResult');
            if (!token) { alert('请先粘贴你的 Neta Token'); return; }
            if (!link) { alert('请粘贴角色分享链接 / UUID / 角色名'); return; }

            box.style.display = 'block';
            box.innerHTML = '<div style="text-align:center;color:rgba(42,36,32,.58);padding:18px;">正在读取角色资料并生成 CoC 车卡...</div>';

            try {
                const r = await fetch(API + '/coc/character-card', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, link })
                });
                const data = await r.json();
                if (!r.ok || !data.success) throw new Error(data.error || '生成失败');
                renderCocCard(data.card, data.profile);
            } catch(e) {
                box.innerHTML = `<div style="color:var(--wine);background:rgba(125,38,55,.08);border:1px solid rgba(125,38,55,.18);padding:14px;border-radius:10px;">生成失败：${escapeHtml(e.message)}</div>`;
            }
        }

        // ===== AI 聊天 =====
        const chatHistory = document.getElementById('chatHistory');
        let conversation = [];

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.style.cssText = `text-align:${role==='user'?'right':'left'};margin-bottom:10px;`;
            const bubble = document.createElement('span');
            bubble.style.cssText = `display:inline-block;padding:11px 15px;border-radius:12px;max-width:80%;text-align:left;line-height:1.65;box-shadow:0 8px 18px rgba(54,36,20,.12);${role==='user'?'background:linear-gradient(135deg,#1f5f62,#143f43);color:#fff7e7;border-bottom-right-radius:2px;':'background:rgba(255,252,243,.7);border:1px solid rgba(80,58,34,.16);color:#2a2420;border-bottom-left-radius:2px;'}`;
            bubble.innerText = text;
            div.appendChild(bubble);
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            if (!serverLLMEnabled) {
                appendMessage('ai', '后端 LLM 未启用：请先在后端 .env 配置 LLM_API_KEY 并重启服务。');
                return;
            }

            appendMessage('user', text);
            conversation.push({ role: 'user', content: text });
            input.value = '';

            const loading = document.createElement('div');
            loading.id = 'chatLoading';
            loading.style.cssText = 'text-align:left;margin-bottom:10px;';
            loading.innerHTML = '<span style="background:rgba(255,252,243,.7);border:1px solid rgba(80,58,34,.16);padding:10px 14px;border-radius:12px;color:#665b50;display:inline-block;">AI 思考中...</span>';
            chatHistory.appendChild(loading);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                const r = await fetch(API + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversation, mode: 'llm' })
                });
                document.getElementById('chatLoading')?.remove();
                if (!r.ok) { const err = await r.json(); appendMessage('ai', '错误: ' + (err.error || r.statusText)); return; }
                const data = await r.json();
                appendMessage('ai', data.reply);
                conversation.push({ role: 'assistant', content: data.reply });
            } catch(e) {
                document.getElementById('chatLoading')?.remove();
                appendMessage('ai', '网络错误: ' + e.message);
            }
        }
    </script>
</body>
</html>
