            { id: 'leaf-l4', delay: 3550, duration: 250 },
            { id: 'leaf-r4', delay: 3550, duration: 250 },
            { id: 'leaf-l5', delay: 3700, duration: 250 },
            { id: 'leaf-r5', delay: 3700, duration: 250 },
            { id: 'leaf-b1', delay: 3850, duration: 250 },
            { id: 'leaf-b2', delay: 3950, duration: 250 },
            { id: 'leaf-b3', delay: 4050, duration: 250 },
            { id: 'leaf-b4', delay: 4150, duration: 250 },
            { id: 'leaf-b5', delay: 4250, duration: 250 },
            { id: 'garland', delay: 4350, duration: 400 },
            { id: 'berry1', delay: 4500, duration: 200 },
            { id: 'berry2', delay: 4600, duration: 200 },
            { id: 'berry3', delay: 4700, duration: 200 },
            { id: 'text', delay: 4900, duration: 600 },
        ];
        
        let timeouts = [];
        
        function play() {
            timeouts.forEach(t => clearTimeout(t));
            timeouts = [];
            
            document.querySelectorAll('.geo-shape').forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'scale(0.7)';
                el.style.transition = 'none';
            });
            
            animations.forEach(a => {
                const t = setTimeout(() => {
                    const el = document.getElementById(a.id);
                    if (el) {
                        el.style.transition = `opacity ${a.duration}ms cubic-bezier(0.25,0.46,0.45,0.94), transform ${a.duration}ms cubic-bezier(0.34,1.56,0.64,1)`;
                        el.style.opacity = '1';
                        el.style.transform = 'scale(1)';
                    }
                }, a.delay);
                timeouts.push(t);
            });
        }
        
        function replay() { play(); }
        window.addEventListener('load', () => setTimeout(play, 400));
    </script>
