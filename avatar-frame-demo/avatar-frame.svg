<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="gold" cx="50%" cy="36%" r="66%">
      <stop offset="0" stop-color="#FFF4B8"/>
      <stop offset="0.28" stop-color="#F4C84D"/>
      <stop offset="0.62" stop-color="#B46B16"/>
      <stop offset="1" stop-color="#5B2A08"/>
    </radialGradient>
    <linearGradient id="jade" x1="225" y1="175" x2="805" y2="865" gradientUnits="userSpaceOnUse">
      <stop stop-color="#55FFE3"/>
      <stop offset="0.48" stop-color="#1C8EFF"/>
      <stop offset="1" stop-color="#6C3CFF"/>
    </linearGradient>
    <linearGradient id="redGem" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFE1EF"/>
      <stop offset="0.42" stop-color="#FF477D"/>
      <stop offset="1" stop-color="#8A0733"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#12030C" flood-opacity="0.65"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="leaf" d="M0 -38 C28 -24 38 4 12 34 C4 14 -10 -6 0 -38Z"/>
  </defs>

  <!-- transparent avatar hole intentionally left open -->
  <g filter="url(#shadow)">
    <!-- outer aura -->
    <circle cx="512" cy="520" r="380" stroke="url(#jade)" stroke-width="34" opacity="0.55" filter="url(#glow)"/>

    <!-- main metal ring -->
    <circle cx="512" cy="520" r="348" stroke="url(#gold)" stroke-width="74"/>
    <circle cx="512" cy="520" r="304" stroke="#3A1705" stroke-width="10" opacity="0.75"/>
    <circle cx="512" cy="520" r="386" stroke="#FFE99B" stroke-width="8" opacity="0.9"/>
    <circle cx="512" cy="520" r="346" stroke="#FFF1A6" stroke-width="5" opacity="0.9"/>

    <!-- inner cut guide, center is transparent -->
    <circle cx="512" cy="520" r="268" stroke="#0A1224" stroke-width="20" opacity="0.82"/>
    <circle cx="512" cy="520" r="252" stroke="#7EEBFF" stroke-width="5" opacity="0.8"/>

    <!-- top crown -->
    <path d="M362 213 L414 119 L475 207 L512 90 L551 207 L613 119 L662 213 L636 274 H388 L362 213Z" fill="url(#gold)" stroke="#FFF0A0" stroke-width="7" stroke-linejoin="round"/>
    <path d="M395 223 H629 L616 253 H408 L395 223Z" fill="#743208" opacity="0.55"/>
    <circle cx="512" cy="88" r="26" fill="url(#redGem)" stroke="#FFD9E5" stroke-width="6"/>
    <circle cx="414" cy="119" r="19" fill="#43E5FF" stroke="#E8FCFF" stroke-width="5"/>
    <circle cx="613" cy="119" r="19" fill="#43E5FF" stroke="#E8FCFF" stroke-width="5"/>

    <!-- side wings / ornaments -->
    <g opacity="0.98">
      <path d="M206 350 C116 356 77 421 70 501 C133 462 188 467 231 503 C186 522 145 562 128 621 C206 592 257 617 288 666 C295 554 274 438 206 350Z" fill="url(#gold)" stroke="#FFE99B" stroke-width="7" stroke-linejoin="round"/>
      <path d="M818 350 C908 356 947 421 954 501 C891 462 836 467 793 503 C838 522 879 562 896 621 C818 592 767 617 736 666 C729 554 750 438 818 350Z" fill="url(#gold)" stroke="#FFE99B" stroke-width="7" stroke-linejoin="round"/>
      <path d="M118 454 C172 426 218 439 256 481" stroke="#6B2D08" stroke-width="12" opacity="0.45"/>
      <path d="M906 454 C852 426 806 439 768 481" stroke="#6B2D08" stroke-width="12" opacity="0.45"/>
    </g>

    <!-- four gem anchors -->
    <g filter="url(#glow)">
      <path d="M512 217 L554 259 L512 301 L470 259 Z" fill="url(#redGem)" stroke="#FFE3EC" stroke-width="7"/>
      <path d="M512 739 L554 781 L512 823 L470 781 Z" fill="url(#jade)" stroke="#E6FFFF" stroke-width="7"/>
      <path d="M251 520 L293 478 L335 520 L293 562 Z" fill="#25D9FF" stroke="#E6FFFF" stroke-width="7"/>
      <path d="M773 520 L731 478 L689 520 L731 562 Z" fill="#25D9FF" stroke="#E6FFFF" stroke-width="7"/>
    </g>

    <!-- bottom nameplate -->
    <path d="M337 799 C388 837 450 856 512 856 C574 856 636 837 687 799 L727 847 C665 901 589 927 512 927 C435 927 359 901 297 847 L337 799Z" fill="url(#gold)" stroke="#FFF0A0" stroke-width="7" stroke-linejoin="round"/>
    <path d="M390 843 C472 876 552 876 634 843" stroke="#5E2607" stroke-width="12" opacity="0.45" stroke-linecap="round"/>

    <!-- small laurel marks around ring -->
    <g fill="#FFF1A6" opacity="0.9">
      <use href="#leaf" transform="translate(365 253) rotate(-36) scale(.75)"/>
      <use href="#leaf" transform="translate(659 253) rotate(36) scale(.75)"/>
      <use href="#leaf" transform="translate(305 690) rotate(-145) scale(.65)"/>
      <use href="#leaf" transform="translate(719 690) rotate(145) scale(.65)"/>
    </g>

    <!-- sparkle points -->
    <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.95" filter="url(#glow)">
      <path d="M244 242 V284 M223 263 H265"/>
      <path d="M786 262 V302 M766 282 H806"/>
      <path d="M202 724 V758 M185 741 H219"/>
      <path d="M828 724 V758 M811 741 H845"/>
    </g>
  </g>
</svg>
