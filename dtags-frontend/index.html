<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTags - Danbooru 标签智能匹配</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;color:#eaeaea;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:2rem 1rem}
        .container{max-width:1200px;margin:0 auto}
        header{text-align:center;margin-bottom:2rem}
        h1{font-size:2.5rem;background:linear-gradient(90deg,#e94560,#ff6b6b,#feca57);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
        .subtitle{color:#a0a0a0;font-size:1rem}
        .input-section{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem}
        .input-group{display:flex;gap:.75rem;flex-wrap:wrap}
        textarea{flex:1;min-width:300px;min-height:100px;padding:1rem;border:2px solid rgba(233,69,96,.3);border-radius:12px;background:rgba(0,0,0,.3);color:#fff;font-size:1rem;resize:vertical;transition:border-color .3s;font-family:inherit}
        textarea:focus{outline:none;border-color:#e94560}
        textarea::placeholder{color:#666}
        .btn-group{display:flex;flex-direction:column;gap:.5rem}
        button{padding:.875rem 1.5rem;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;font-family:inherit}
        .btn-primary{background:linear-gradient(135deg,#e94560,#c73e54);color:#fff}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(233,69,96,.4)}
        .btn-secondary{background:rgba(255,255,255,.1);color:#eaeaea}
        .btn-secondary:hover{background:rgba(255,255,255,.2)}
        .btn-primary:disabled,.btn-secondary:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
        .examples{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem}
        .example-chip{padding:.35rem .75rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:.85rem;color:#b0b0b0;cursor:pointer;transition:all .2s}
        .example-chip:hover{background:rgba(233,69,96,.2);border-color:#e94560;color:#fff}
        .results-section{display:grid;grid-template-columns:1fr;gap:1.5rem}
        @media(min-width:900px){.results-section{grid-template-columns:1fr 1fr}}
        .result-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.5rem}
        .result-card h3{color:#e94560;margin-bottom:1rem;font-size:1.1rem;display:flex;align-items:center;gap:.5rem}
        .tag-list{display:flex;flex-wrap:wrap;gap:.6rem}
        .tag{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem .9rem;background:linear-gradient(135deg,rgba(233,69,96,.15),rgba(233,69,96,.05));border:1px solid rgba(233,69,96,.3);border-radius:8px;font-size:.9rem;cursor:pointer;transition:all .2s;position:relative}
        .tag:hover{background:rgba(233,69,96,.3);transform:translateY(-2px)}
        .tag .en{color:#ff6b6b;font-weight:500}
        .tag .zh{color:#a0a0a0;font-size:.8rem}
        .tag .copy-hint{position:absolute;top:-25px;left:50%;transform:translateX(-50%);background:#e94560;color:#fff;padding:2px 8px;border-radius:4px;font-size:.7rem;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
        .tag:hover .copy-hint{opacity:1}
        .tag.copied{background:rgba(39,174,96,.3)!important;border-color:#27ae60!important}
        .explanation{color:#888;font-size:.9rem;line-height:1.6;margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.1)}
        .intent-info{background:rgba(0,0,0,.2);border-radius:10px;padding:1rem;margin-bottom:1rem}
        .intent-info p{margin:.3rem 0;font-size:.9rem;color:#aaa}
        .intent-info .label{color:#e94560;font-weight:500}
        .loading{display:none;text-align:center;padding:3rem}
        .loading.active{display:block}
        .spinner{width:50px;height:50px;border:3px solid rgba(233,69,96,.3);border-top-color:#e94560;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        .error{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.5);border-radius:10px;padding:1rem;color:#e74c3c;margin-top:1rem}
        .copy-all{margin-top:1rem;text-align:right}
        .tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:.5rem}
        .tab{padding:.6rem 1.2rem;background:transparent;border:none;color:#888;font-size:.9rem;cursor:pointer;border-radius:8px;transition:all .2s;font-family:inherit}
        .tab:hover{color:#fff;background:rgba(255,255,255,.05)}
        .tab.active{color:#e94560;background:rgba(233,69,96,.1)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        footer{text-align:center;padding:2rem;color:#666;font-size:.85rem;margin-top:2rem}
        footer a{color:#e94560;text-decoration:none}
        .empty-state{text-align:center;padding:3rem;color:#666}
        .status-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;margin-left:8px}
        .status-badge.success{background:rgba(39,174,96,.2);color:#27ae60}
        .status-badge.thinking{background:rgba(255,193,7,.2);color:#ffc107}
        .status-badge.local{background:rgba(100,100,255,.2);color:#6666ff}
        .load-progress{width:100%;max-width:300px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:1rem auto 0;overflow:hidden}
        .load-progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#e94560,#ff6b6b);border-radius:2px;transition:width .3s}
        .load-text{font-size:.9rem;color:#aaa;margin-top:.5rem}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏷️ DTags</h1>
            <p class="subtitle">Danbooru 标签智能匹配 - 中文输入，精准输出</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('match')"> 智能匹配</button>
            <button class="tab" onclick="switchTab('database')"> 标签库</button>
        </div>

        <!-- 智能匹配 -->
        <div id="tab-match" class="tab-content active">
            <div class="input-section">
                <div class="input-group">
                    <textarea id="query-input" placeholder="描述你想要的图像内容，例如：&#10;• 一个银发蓝眼的动漫女孩，穿着白色连衣裙&#10;• 赛博朋克风格的猫耳少女&#10;• 樱花树下的和服少女，微笑"></textarea>
                    <div class="btn-group">
                        <button class="btn-primary" id="match-btn" onclick="matchTags()">🤖 智能匹配</button>
                        <button class="btn-secondary" onclick="matchSimple()">⚡ 本地匹配</button>
                    </div>
                </div>
                <div class="examples">
                    <span>快速示例：</span>
                    <span class="example-chip" onclick="setQuery('银发蓝眼的动漫女孩，穿着白色连衣裙')">银发少女</span>
                    <span class="example-chip" onclick="setQuery('赛博朋克风格的猫耳少女')">赛博猫娘</span>
                    <span class="example-chip" onclick="setQuery('樱花树下的和服少女，微笑')">樱花和服</span>
                    <span class="example-chip" onclick="setQuery('金发双马尾，女仆装')">金发女仆</span>
                    <span class="example-chip" onclick="setQuery('异色瞳的精灵少女，翅膀')">异色瞳精灵</span>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div class="load-text" id="load-text">正在分析并匹配标签...</div>
                <div class="load-progress"><div class="load-progress-bar" id="progress-bar"></div></div>
            </div>

            <div id="error" class="error" style="display:none"></div>

            <div class="results-section" id="results" style="display:none">
                <div class="result-card">
                    <h3>🎯 匹配结果 <span id="status-badge"></span></h3>
                    <div id="intent-info" class="intent-info"></div>
                    <div class="tag-list" id="tag-list"></div>
                    <div class="copy-all">
                        <button class="btn-secondary" onclick="copyAllTags()">📋 复制全部</button>
                    </div>
                </div>
                <div class="result-card">
                    <h3>💡 说明</h3>
                    <div id="explanation" class="explanation"></div>
                </div>
            </div>
        </div>

        <!-- 标签库 -->
        <div id="tab-database" class="tab-content">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="search-input" placeholder="搜索标签..." style="flex:1;padding:.875rem 1rem;border:2px solid rgba(233,69,96,.3);border-radius:10px;background:rgba(0,0,0,.3);color:#fff;font-size:1rem;font-family:inherit">
                    <select id="category-select" onchange="filterDatabase()" style="padding:.875rem 1rem;border:2px solid rgba(233,69,96,.3);border-radius:10px;background:rgba(0,0,0,.3);color:#fff;font-size:1rem;font-family:inherit">
                        <option value="">全部分类</option>
                    </select>
                </div>
            </div>
            <div class="result-card">
                <div class="tag-list" id="database-tags"></div>
            </div>
        </div>

        <footer>
            <p>Powered by <a href="https://danbooru.donmai.us" target="_blank">Danbooru</a> · LLM: Qwen3.5-Plus</p>
        </footer>
    </div>

    <script>
        // ===== LLM 配置 =====
        const LLM_URL = 'https://litellm.talesofai.cn/v1/chat/completions';
        const LLM_KEY = 'sk-fZrLXE0IEs6EDYJCOsLLaQ';
        const LLM_MODEL = 'qwen3.5-plus-no-think';

        let currentTags = [];

        // ===== 标签数据库 =====
        const TAGS_DB = {
            general: [
                {name:'1girl',zh:'1个女孩'},{name:'1boy',zh:'1个男孩'},{name:'solo',zh:'单人'},
                {name:'multiple_girls',zh:'多个女孩'},{name:'looking_at_viewer',zh:'看向观众'},
                {name:'smile',zh:'微笑'},{name:'closed_mouth',zh:'闭嘴'},{name:'open_mouth',zh:'张嘴'},
                {name:'blush',zh:'脸红'},{name:'closed_eyes',zh:'闭眼'},{name:'parted_lips',zh:'微张嘴唇'},
            ],
            quality: [
                {name:'masterpiece',zh:'杰作'},{name:'best_quality',zh:'最高质量'},{name:'highres',zh:'高分辨率'},
                {name:'ultra_detailed',zh:'超详细'},{name:'absurdres',zh:'超高分辨率'},
            ],
            hair: [
                {name:'long_hair',zh:'长发'},{name:'short_hair',zh:'短发'},{name:'blonde_hair',zh:'金发'},
                {name:'brown_hair',zh:'棕发'},{name:'black_hair',zh:'黑发'},{name:'red_hair',zh:'红发'},
                {name:'blue_hair',zh:'蓝发'},{name:'purple_hair',zh:'紫发'},{name:'silver_hair',zh:'银发'},
                {name:'white_hair',zh:'白发'},{name:'pink_hair',zh:'粉发'},{name:'green_hair',zh:'绿发'},
                {name:'twintails',zh:'双马尾'},{name:'ponytail',zh:'单马尾'},{name:'ahoge',zh:'呆毛'},
                {name:'bangs',zh:'刘海'},{name:'hime_cut',zh:'姬发式'},{name:'wavy_hair',zh:'波浪发'},
                {name:'straight_hair',zh:'直发'},{name:'curly_hair',zh:'卷发'},{name:'short_hair',zh:'短发'},
                {name:'very_long_hair',zh:'非常长发'},{name:'hair_over_shoulder',zh:'头发披肩'},
            ],
            eyes: [
                {name:'blue_eyes',zh:'蓝眼'},{name:'red_eyes',zh:'红眼'},{name:'green_eyes',zh:'绿眼'},
                {name:'purple_eyes',zh:'紫眼'},{name:'yellow_eyes',zh:'黄眼'},{name:'heterochromia',zh:'异色瞳'},
                {name:'closed_eyes',zh:'闭眼'},{name:'half-closed_eyes',zh:'半闭眼'},{name:'eye_contact',zh:'眼神交流'},
                {name:'large_eyes',zh:'大眼睛'},{name:'small_eyes',zh:'小眼睛'},
            ],
            clothing: [
                {name:'school_uniform',zh:'校服'},{name:'maid',zh:'女仆装'},{name:'kimono',zh:'和服'},
                {name:'sailor_collar',zh:'水手领'},{name:'shirt',zh:'衬衫'},{name:'dress',zh:'连衣裙'},
                {name:'skirt',zh:'裙子'},{name:'thighhighs',zh:'过膝袜'},{name:'pantyhose',zh:'连裤袜'},
                {name:'gloves',zh:'手套'},{name:'hat',zh:'帽子'},{name:'ribbon',zh:'丝带'},
                {name:'bow',zh:'蝴蝶结'},{name:'necktie',zh:'领带'},{name:'necklace',zh:'项链'},
                {name:'hairband',zh:'发带'},{name:'hair_ribbon',zh:'发带'},{name:'hairclip',zh:'发夹'},
                {name:'bikini',zh:'比基尼'},{name:'swimsuit',zh:'泳衣'},{name:'armor',zh:'盔甲'},
                {name:'cape',zh:'披风'},{name:'hood',zh:'兜帽'},{name:'collared_shirt',zh:'有领衬衫'},
                {name:'sweater',zh:'毛衣'},{name:'jacket',zh:'夹克'},{name:'coat',zh:'外套'},
                {name:'pants',zh:'裤子'},{name:'shorts',zh:'短裤'},{name:'jeans',zh:'牛仔裤'},
                {name:'socks',zh:'袜子'},{name:'shoes',zh:'鞋子'},{name:'boots',zh:'靴子'},
                {name:'sandals',zh:'凉鞋'},{name:'barefoot',zh:'赤脚'},
            ],
            pose: [
                {name:'standing',zh:'站立'},{name:'sitting',zh:'坐着'},{name:'lying',zh:'躺着'},
                {name:'looking_at_viewer',zh:'看向观众'},{name:'looking_back',zh:'回头看'},
                {name:'arms_up',zh:'举手'},{name:'arms_behind_back',zh:'双手背后'},{name:'hand_on_hip',zh:'叉腰'},
                {name:'hand_on_own_cheek',zh:'手托脸颊'},{name:'fingers_together',zh:'手指并拢'},
                {name:'v',zh:'剪刀手'},{name:'peace_sign',zh:'和平手势'},{name:'head_tilt',zh:'歪头'},
                {name:'leaning',zh:'倾斜'},{name:'kneeling',zh:'跪姿'},{name:'crouching',zh:'蹲姿'},
            ],
            background: [
                {name:'simple_background',zh:'简单背景'},{name:'white_background',zh:'白色背景'},
                {name:'outdoors',zh:'户外'},{name:'indoors',zh:'室内'},{name:'sky',zh:'天空'},
                {name:'cloud',zh:'云'},{name:'flower',zh:'花'},{name:'cherry_blossoms',zh:'樱花'},
                {name:'tree',zh:'树'},{name:'forest',zh:'森林'},{name:'ocean',zh:'海洋'},
                {name:'beach',zh:'海滩'},{name:'city',zh:'城市'},{name:'night',zh:'夜晚'},
                {name:'sunset',zh:'日落'},{name:'sunrise',zh:'日出'},{name:'stars',zh:'星星'},
                {name:'moon',zh:'月亮'},{name:'rain',zh:'雨'},{name:'snow',zh:'雪'},
            ],
            features: [
                {name:'animal_ears',zh:'兽耳'},{name:'cat_ears',zh:'猫耳'},{name:'fox_ears',zh:'狐耳'},
                {name:'dog_ears',zh:'犬耳'},{name:'bunny_ears',zh:'兔耳'},{name:'wolf_ears',zh:'狼耳'},
                {name:'tail',zh:'尾巴'},{name:'cat_tail',zh:'猫尾'},{name:'fox_tail',zh:'狐尾'},
                {name:'wings',zh:'翅膀'},{name:'angel_wings',zh:'天使翅膀'},{name:'demon_wings',zh:'恶魔翅膀'},
                {name:'horns',zh:'角'},{name:'demon_horns',zh:'恶魔角'},{name:'elf',zh:'精灵'},
                {name:'vampire',zh:'吸血鬼'},{name:'fairy',zh:'精灵'},{name:'mermaid',zh:'人鱼'},
                {name:'android',zh:'机器人'},{name:'robot',zh:'机器人'},{name:'cyborg',zh:'改造人'},
                {name:'magic',zh:'魔法'},{name:'fire',zh:'火焰'},{name:'ice',zh:'冰'},
                {name:'lightning',zh:'闪电'},{name:'water',zh:'水'},{name:'wind',zh:'风'},
                {name:'earth',zh:'土'},{name:'nature',zh:'自然'},{name:'celestial',zh:'天体'},
            ],
            style: [
                {name:'anime_style',zh:'动漫风格'},{name:'chibi',zh:'Q版'},{name:'sketch',zh:'素描'},
                {name:'lineart',zh:'线稿'},{name:'watercolor_(medium)',zh:'水彩'},{name:'oil_painting_(medium)',zh:'油画'},
                {name:'digital_media_(artwork)',zh:'数字绘画'},{name:'pixel_art',zh:'像素画'},
                {name:'realistic',zh:'写实'},{name:'semi-realistic',zh:'半写实'},{name:'abstract',zh:'抽象'},
                {name:'surreal',zh:'超现实'},{name:'minimalist',zh:'极简'},{name:'ornate',zh:'华丽'},
            ],
        };

        function getAllTags() {
            const all = [];
            for (const cat in TAGS_DB) {
                all.push(...TAGS_DB[cat].map(t => ({...t, category: cat})));
            }
            return all;
        }

        function findRelevantTags(query, limit = 50) {
            const keywords = query.toLowerCase().split(/\s+/);
            const allTags = getAllTags();
            const scored = allTags.map(tag => {
                let score = 0;
                const searchText = `${tag.name} ${tag.zh} ${tag.category}`.toLowerCase();
                for (const kw of keywords) {
                    if (searchText.includes(kw)) {
                        score += 10;
                        if (tag.zh.includes(kw)) score += 5;
                        if (tag.name.includes(kw)) score += 3;
                    }
                }
                return {...tag, score};
            });
            return scored.filter(t => t.score > 0).sort((a, b) => b.score - a.score).slice(0, limit);
        }

        // ===== LLM 调用 =====
        async function aiCall(systemPrompt, userPrompt, maxTokens = 2048, temperature = 0.3) {
            const response = await fetch(LLM_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${LLM_KEY}`
                },
                body: JSON.stringify({
                    model: LLM_MODEL,
                    messages: [
                        {role: 'system', content: systemPrompt},
                        {role: 'user', content: userPrompt}
                    ],
                    max_tokens: maxTokens,
                    temperature: temperature
                })
            });
            if (!response.ok) {
                const err = await response.text();
                throw new Error(`LLM 错误: ${response.status} - ${err}`);
            }
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // ===== 意图分析 =====
        async function analyzeIntent(query) {
            const system = '只返回JSON';
            const user = `分析用户描述，判断主要需要什么类型的 Danbooru 标签。
用户描述："${query}"
返回 JSON：{"primary_type":"object/character/scene/action/style","secondary_types":["..."],"key_elements":["元素"],"should_add_quality_tags":bool,"should_add_generic_tags":bool}`;
            const raw = await aiCall(system, user, 256, 0.1);
            try { return JSON.parse(raw); }
            catch (e) { return {primary_type:'general',secondary_types:[],key_elements:[query],should_add_quality_tags:false,should_add_generic_tags:false}; }
        }

        // ===== 标签匹配 =====
        async function matchTags() {
            const query = document.getElementById('query-input').value.trim();
            if (!query) return alert('请输入描述内容');

            const btn = document.getElementById('match-btn');
            btn.disabled = true;
            showLoading(true, '正在分析意图...');

            try {
                // Step 1: 意图分析
                const intent = await analyzeIntent(query);
                updateProgress(30, '正在筛选相关标签...');

                // Step 2: 筛选标签
                const relevantTags = findRelevantTags(query, 200);
                const tagsText = relevantTags.map(t => `- ${t.name} (${t.zh}) [${t.category}]`).join('\n');
                updateProgress(50, '正在匹配标签...');

                // Step 3: LLM 匹配
                const qualityHint = intent.should_add_quality_tags ? '可添加质量标签' : '不要添加质量标签';
                const genericHint = intent.should_add_generic_tags ? '可添加构图标签' : '不要添加无关的构图/背景/姿势标签';

                const system = '只返回 JSON';
                const user = `你是 Danbooru 标签匹配专家。
用户描述："${query}"
意图分析：用户主要想要 ${intent.primary_type} 类型标签
关键元素：${intent.key_elements.join('、')}
${qualityHint}
${genericHint}

词库参考：
${tagsText}

组合词规则（非常重要！）：
- 形状: {shape}_shaped (如 star_shaped, heart_shaped)
- 印花: {pattern}_print (如 floral_print, striped_print)
- 装饰边: {material}_trim (如 ribbon_trim, lace_trim)
- 渐变色: gradient_{color} (如 gradient_hair)
- 颜色组合: {color}_and_{color} (如 black_and_white)
- 材质+物品: {material}_{object} (如 silk_dress)
- 颜色+特征: {color}_{feature} (如 blue_eyes, red_hair)

规则：
1. 只返回与描述直接相关的标签
2. 不要添加用户没提到的通用标签
3. 词库只是参考，没有的标签自行翻译生成（下划线分隔小写英文）
4. 返回 10-30 个最匹配的标签

返回 JSON：
{"tags":[{"name":"","zh":"","source":"database/llm_translated","reason":""}],"explanation":""}`;

                updateProgress(70, '正在生成结果...');
                const raw = await aiCall(system, user, 2048, 0.3);
                updateProgress(100, '完成!');

                let result;
                try {
                    result = JSON.parse(raw);
                } catch (e) {
                    const jsonMatch = raw.match(/\{[\s\S]*\}/);
                    if (jsonMatch) result = JSON.parse(jsonMatch[0]);
                    else throw new Error('无法解析 LLM 返回结果');
                }

                currentTags = result.tags || [];
                displayResults(result, intent, 'ai');
            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                showLoading(false);
            }
        }

        // ===== 本地匹配 =====
        function matchSimple() {
            const query = document.getElementById('query-input').value.trim();
            if (!query) return alert('请输入描述内容');

            const tags = findRelevantTags(query, 30);
            currentTags = tags.map(t => ({name: t.name, zh: t.zh, source: 'database', reason: `分类: ${t.category}`}));

            displayResults({
                tags: currentTags,
                explanation: `根据关键词"${query}"找到 ${tags.length} 个匹配标签`
            }, null, 'local');
        }

        // ===== UI =====
        function displayResults(data, intent, mode) {
            // 状态徽章
            const badge = document.getElementById('status-badge');
            if (mode === 'ai') {
                badge.className = 'status-badge success';
                badge.textContent = 'AI 匹配';
            } else {
                badge.className = 'status-badge local';
                badge.textContent = '本地匹配';
            }

            // 意图信息
            const intentEl = document.getElementById('intent-info');
            if (intent) {
                intentEl.innerHTML = `<p><span class="label">主要类型:</span> ${intent.primary_type}</p><p><span class="label">关键元素:</span> ${intent.key_elements?.join('、') || '无'}</p>`;
                intentEl.style.display = 'block';
            } else {
                intentEl.style.display = 'none';
            }

            // 标签列表
            const tagList = document.getElementById('tag-list');
            tagList.innerHTML = currentTags.map(tag => `
                <div class="tag" onclick="copyTag('${tag.name}', this)">
                    <span class="copy-hint">点击复制</span>
                    <span class="en">${tag.name}</span>
                    <span class="zh">${tag.zh}</span>
                </div>
            `).join('');

            document.getElementById('explanation').textContent = data.explanation || '匹配完成';
            document.getElementById('results').style.display = 'grid';
        }

        function copyTag(tagName, element) {
            navigator.clipboard.writeText(tagName);
            element.classList.add('copied');
            element.querySelector('.copy-hint').textContent = '已复制!';
            setTimeout(() => {
                element.classList.remove('copied');
                element.querySelector('.copy-hint').textContent = '点击复制';
            }, 1500);
        }

        function copyAllTags() {
            const tagNames = currentTags.map(t => t.name).join(', ');
            navigator.clipboard.writeText(tagNames);
            alert('已复制所有标签到剪贴板！');
        }

        function showLoading(show, text) {
            document.getElementById('loading').classList.toggle('active', show);
            if (text) document.getElementById('load-text').textContent = text;
        }

        function updateProgress(percent, text) {
            document.getElementById('progress-bar').style.width = percent + '%';
            if (text) document.getElementById('load-text').textContent = text;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = '错误: ' + msg;
            el.style.display = 'block';
        }

        function setQuery(text) {
            document.getElementById('query-input').value = text;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (tab === 'database') initDatabase();
        }

        function initDatabase() {
            const select = document.getElementById('category-select');
            select.innerHTML = '<option value="">全部分类</option>' +
                Object.keys(TAGS_DB).map(c => `<option value="${c}">${c}</option>`).join('');
            filterDatabase();
        }

        function filterDatabase() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('category-select').value;
            let tags = getAllTags();
            if (category) tags = tags.filter(t => t.category === category);
            if (search) tags = tags.filter(t => t.name.toLowerCase().includes(search) || t.zh.includes(search));

            const container = document.getElementById('database-tags');
            if (tags.length === 0) {
                container.innerHTML = '<p style="color:#888;text-align:center;">暂无匹配标签</p>';
            } else {
                container.innerHTML = tags.map(t => `
                    <div class="tag" onclick="copyTag('${t.name}', this)">
                        <span class="copy-hint">点击复制</span>
                        <span class="en">${t.name}</span>
                        <span class="zh">${t.zh}</span>
                    </div>
                `).join('');
            }
        }

        // 回车搜索
        document.getElementById('query-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); matchTags(); }
        });
    </script>
</body>
</html>
