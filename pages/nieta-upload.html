<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>捏Ta 图库上传</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  min-height: 100vh; color: #eaeaea; padding: 20px;
}
.container { max-width: 520px; margin: 0 auto; }
h1 { text-align: center; font-size: 22px; margin: 20px 0 4px; }
.sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 12px; }

.card {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
  backdrop-filter: blur(10px);
}
.card-label { font-size: 13px; color: #999; margin-bottom: 8px; display: block; }
input[type="password"] {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,.15); background: rgba(0,0,0,.3);
  color: #fff; font-size: 14px; outline: none;
}
input:focus { border-color: #a78bfa; }

.drop-zone {
  border: 2px dashed rgba(255,255,255,.2); border-radius: 14px;
  padding: 40px 20px; text-align: center; cursor: pointer; transition: .2s;
}
.drop-zone:hover { border-color: #a78bfa; background: rgba(167,139,250,.08); }
.drop-zone.has-file { border-style: solid; border-color: #34d399; }
#preview { max-width: 160px; max-height: 160px; border-radius: 10px; margin-top: 12px; display: none; }

.btn {
  width: 100%; padding: 14px; border: 0; border-radius: 12px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; transition: .2s;
}
.btn:hover { opacity: .9; }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.status { font-size: 13px; margin-top: 12px; text-align: center; }
.status.ok { color: #34d399; }
.status.err { color: #ef4444; }

.result { margin-top: 12px; }
.result a {
  display: block; padding: 12px; border-radius: 10px;
  background: rgba(52,211,153,.12); color: #34d399;
  font-size: 12px; word-break: break-all; text-decoration: none;
}
.result img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: none; }

.proxy-hint {
  text-align: center; font-size: 12px; color: #fbbf24;
  padding: 10px; border-radius: 8px; background: rgba(251,191,36,.1);
  margin-bottom: 16px;
}
</style>
</head>
<body>
<div class="container">
  <h1>🖼️ 捏Ta 图库上传</h1>
  <p class="sub">通过本地代理上传，告别 CORS 限制</p>

  <div class="proxy-hint" id="proxyHint">🔌 正在连接代理...</div>

  <div class="card">
    <label class="card-label">Token</label>
    <input type="password" id="token" placeholder="粘贴 NIETA_ACCESS_TOKEN">
  </div>

  <div class="card">
    <label class="card-label">选择图片</label>
    <div class="drop-zone" id="dropZone">
      <div>📁 点击或拖拽图片</div>
      <div style="color:#666;font-size:12px;margin-top:4px">PNG / JPG / WebP</div>
    </div>
    <img id="preview" alt="预览">
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>

  <button class="btn" id="uploadBtn" disabled>上传到图库</button>
  <div class="status" id="status"></div>
  <div class="result" id="result"></div>
</div>

<script>
const PROXY = "http://localhost:9876";
const tokenEl = document.getElementById("token");
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const uploadBtn = document.getElementById("uploadBtn");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const proxyHint = document.getElementById("proxyHint");

let selectedFile = null;

// 从 localStorage 恢复 token
const saved = localStorage.getItem("nieta_upload_token");
if (saved) tokenEl.value = saved;
// 检查 hash
if (location.hash && location.hash.length > 10) {
  tokenEl.value = location.hash.slice(1);
  location.hash = "";
}

tokenEl.addEventListener("input", () => {
  localStorage.setItem("nieta_upload_token", tokenEl.value.trim());
  checkReady();
});

// 检测代理
async function checkProxy() {
  try {
    const r = await fetch(`${PROXY}/health`, { method: "OPTIONS" });
    proxyHint.textContent = "✅ 代理已连接";
    proxyHint.style.color = "#34d399";
    proxyHint.style.background = "rgba(52,211,153,.1)";
  } catch {
    proxyHint.innerHTML = `❌ 代理未启动<br><span style="font-size:11px;color:#999">请先运行: python3 nieta-proxy.py</span>`;
    proxyHint.style.color = "#ef4444";
    proxyHint.style.background = "rgba(239,68,68,.1)";
  }
}
checkProxy();
setInterval(checkProxy, 5000);

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag"));
dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("drag");
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith("image/")) handleFile(f);
});
fileInput.addEventListener("change", () => {
  const f = fileInput.files[0];
  if (f) handleFile(f);
});

function handleFile(file) {
  selectedFile = file;
  dropZone.classList.add("has-file");
  dropZone.querySelector("div").textContent = `✅ ${file.name} (${(file.size/1024).toFixed(0)}KB)`;
  const reader = new FileReader();
  reader.onload = e => { preview.src = e.target.result; preview.style.display = "block"; };
  reader.readAsDataURL(file);
  checkReady();
}

function checkReady() {
  uploadBtn.disabled = !(tokenEl.value.trim() && selectedFile);
}

uploadBtn.addEventListener("click", async () => {
  const token = tokenEl.value.trim();
  if (!token || !selectedFile) return;

  uploadBtn.disabled = true;
  uploadBtn.textContent = "上传中...";
  statusEl.textContent = "正在上传...";
  statusEl.className = "status";
  resultEl.innerHTML = "";

  try {
    // 读取文件为 base64
    const base64 = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(",")[1]);
      reader.readAsDataURL(selectedFile);
    });

    const suffix = selectedFile.name.split(".").pop() || "png";

    // 通过代理上传
    const resp = await fetch(`${PROXY}/upload`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, suffix, file: base64 })
    });

    const data = await resp.json();

    if (data.ok) {
      statusEl.textContent = "✅ 上传成功！";
      statusEl.className = "status ok";
      resultEl.innerHTML = `
        <a href="${data.view_url}" target="_blank">${data.view_url}</a>
        <img src="${data.view_url}" onload="this.style.display='block'" onerror="this.remove()">
      `;
    } else {
      throw new Error(data.error);
    }
  } catch (err) {
    statusEl.textContent = `❌ ${err.message}`;
    statusEl.className = "status err";
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = "上传到图库";
  }
});
</script>
</body>
</html>
