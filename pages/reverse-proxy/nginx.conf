server {
    listen 80;
    server_name your-domain.example.com;

    # If you already have HTTPS certificates, replace this block with your SSL server block.
    # For production, enable HTTPS via certbot or your hosting provider.

    location / {
        proxy_pass https://s-63a86395-de5c-46f9-a54d-0f7d02aa0671-3000.cohub.run;
        proxy_ssl_server_name on;
        proxy_set_header Host s-63a86395-de5c-46f9-a54d-0f7d02aa0671-3000.cohub.run;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
